name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Doctor
        run: npm run doctor
      - name: Module parse check
        run: npm run check:modules
      - name: Full test suite (incl. P0 hard gates)
        run: npm test
